services:
  - type: web
    name: foodsprint
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: foodsprint-db
          property: connectionString
      - key: APP_BASE_URL
        sync: false
      - key: SPOONACULAR_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

databases:
  - name: foodsprint-db
